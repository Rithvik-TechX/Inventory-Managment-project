# ============================
# SERVER CONFIGURATION
# ============================
server.port=8083
spring.application.name=inventory-system

# ============================
# DATABASE (MySQL)
# ============================
# inventory_db is the existing local schema that contains the project data.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inventory_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Connection pool
spring.datasource.hikari.pool-name=HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ============================
# JPA / HIBERNATE
# ============================
# Never use create or create-drop here: either setting destroys existing data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================
# JWT SECURITY
# ============================
# Production deployments must override this development-only fallback.
jwt.secretKey=${JWT_SECRET:inventtrack-secret-key-2026-infosys-project-default-dev-only}
jwt.expiration=3600000

# ============================
# EMAIL (Gmail SMTP)
# ============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:rithvikgandhamalla14@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================
# APP CONFIG
# ============================
app.admin.email=rithvikgandhamalla14@gmail.com
app.name=InvenTrack
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# ============================
# ACTUATOR
# ============================
management.health.mail.enabled=false

# ============================
# LOGGING
# ============================
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO